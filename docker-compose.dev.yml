# Development Docker Compose - Hot Reload Enabled
version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: zalo-crm-app-dev
    restart: unless-stopped
    ports:
      - "3080:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${DB_USER:-crmuser}:${DB_PASSWORD}@db:5432/${DB_NAME:-zalocrm}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount backend source for hot reload
      - ./backend:/app/backend
      # Mount frontend source for hot reload
      - ./frontend:/app/frontend
      # Named volumes for node_modules to avoid host OS conflicts
      - backend_node_modules:/app/backend/node_modules
      - frontend_node_modules:/app/frontend/node_modules
      - file_storage:/var/lib/zalo-crm/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:16-alpine
    container_name: zalo-crm-db-dev
    restart: unless-stopped
    environment:
